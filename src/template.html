<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="index.js" defer></script>
</head>
<body>
    <div class="container flex-row space-around">
        <form novalidate>
            <div>
                <input type="text" placeholder="Search for cities">
                <button type="submit">Search</button>
            </div>
            <p class="error">Please enter a valid city name</p>

        </form>
        <div class="forecast flex-col">
            <div class="current-container">
                <div class="todays-forecast">
                    <h1 class="text-primary loc" id="loc-text">Location</h1>
                    <p class="text-primary temp" id="temp-text">31</p>
                    <img src="#" class="icon">

                </div>
                <div class="card">
                    <h3>Hourly Forecast</h3>
                    <div class="hourly-grid">
                        <div class="flex-col justify-center align-center">
                            <span class="hourly-time">6:00 am</span>
                            <img src="#">
                            <span class="hourly-temp">25</span>
                        </div>
                        <div class="flex-col justify-center align-center">
                            <span class="hourly-time">6:00 am</span>
                            <img src="#">
                            <span class="hourly-temp">25</span>
                        </div>
                        <div class="flex-col justify-center align-center">
                            <span class="hourly-time">6:00 am</span>
                            <img src="#">
                            <span class="hourly-temp">25</span>
                        </div>
                        <div class="flex-col justify-center align-center">
                            <span class="hourly-time">6:00 am</span>
                            <img src="#">
                            <span class="hourly-temp">25</span>
                        </div>
                        <div class="flex-col justify-center align-center">
                            <span class="hourly-time">6:00 am</span>
                            <img src="#">
                            <span class="hourly-temp">25</span>
                        </div>
                        <div class="flex-col justify-center align-center">
                            <span class="hourly-time">6:00 am</span>
                            <img src="#">
                            <span class="hourly-temp">25</span>
                        </div>
                    </div>

                    </div>

                </div>
                <div class="card flex-col">
                    <h3>Air Conditions</h3>
                    <div class="cond-grid">
                        <div class="flex-col justify-center align-center">
                            <span class="cond-name">Real Feel</span>
                            <span data-metric = "feelslike" class="cond-value">30</span>
                        </div>
                        <div class="flex-col justify-center align-center">
                            <span class="cond-name">Real Feel</span>
                            <span data-metric = "humidity" class="cond-value">30</span>
                        </div>
                        <div class="flex-col justify-center align-center">
                            <span class="cond-name">Real Feel</span>
                            <span data-metric = "uvindex" class="cond-value">30</span>
                        </div>
                        <div class="flex-col justify-center align-center">
                            <span class="cond-name">Real Feel</span>
                            <span data-metric = "visibility" class="cond-value">30</span>
                        </div>
                    </div>

                    
                </div>

            </div>
            <div class="card">
                <h3>7-day Forecast</h3>
                <div class="weekly-forecast flex-col gap-2rem">
                    <div class="flex-row space-between align-center">
                    <span class="weekday"></span>
                        <div class="flex-row align-start justify-center">
                            <img class="weekday-icon" src="#">
                            <span class="descr weekday-icon"></span>
                        </div>
                        <span><span class="max"></span><span class="min"></span></span>
                    </div>
                    <div class="flex-row space-between align-center">
                    <span class="weekday"></span>
                        <div>
                            <img class="weekday-icon" src="#">
                            <span class="descr weekday-icon"></span>
                        </div>
                        <span><span class="max"></span><span class="min"></span></span>
                    </div>
                    <div class="flex-row space-between">
                    <span class="weekday"></span>
                        <div>
                            <img class="weekday-icon" src="#">
                            <span class="descr weekday-icon"></span>
                        </div>
                        <span><span class="max"></span><span class="min"></span></span>
                    </div>
                    <div class="flex-row space-between">
                    <span class="weekday "></span>
                        <div>
                            <img class="weekday-icon" src="#">
                            <span class="descr weekday-icon"></span>
                        </div>
                        <span><span class="max"></span><span class="min"></span></span>
                    </div>
                    <div class="flex-row space-between">
                    <span class="weekday"></span>
                        <div>
                            <img class="weekday-icon" src="#">
                            <span class="descr weekday-icon"></span>
                        </div>
                        <span><span class="max"></span><span class="min"></span></span>
                    </div>
                    <div class="flex-row space-between">
                    <span class="weekday"></span>
                        <div>
                            <img class="weekday-icon" src="#">
                            <span class="descr weekday-icon"></span>
                        </div>
                        <span><span class="max"></span><span class="min"></span></span>
                    </div>
                    <div class="flex-row space-between">
                    <span class="weekday"></span>
                        <div>
                            <img class="weekday-icon" src="#">
                            <span class="descr weekday-icon"></span>
                        </div>
                        <span><span class="max"></span><span class="min"></span></span>
                    </div>

                </div>

            </div>
        </div>

    </div>
    
</body>
</html>
